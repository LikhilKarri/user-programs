<html>
<head>
<title>FRONT END</title>
<style>
     body{
        height:100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(51, 46, 46);
       
    }
    .loginform{
        
        background-color: gray;
         width: 400px;
         height: 350px;
        border-radius: 30px;
        padding:30px;  
    }
  input{
        text-align: center;
        width: 400px;
        
        height:6vh;
        margin-bottom: 15px;
        border-radius: 7px;
    }
   button{
        text-align: center;
        width: 400px;
        height: 5vh;
        border-radius: 20px; 
        margin-top: 10px;
        background-color: rgb(20, 20, 247);
    }
     label{
        margin-bottom:5px;			
        display: block;
        font-size: small;
        font-family: arial, sans-serif;
        color: rgb(0, 0, 0);
    }
     .loginform h1{
        text-align: center;
    }
</style>

</head>
<body>

<form class="loginform" >
<h1>Log into website</h1>
<label for="username">USERNAME:</label>
<input type="text" id="username" placeholder="Mobile number,username or email" ></br>
<label >PASSWORD:</label>
<input type="password" id="Password"  placeholder ="Password" ></br>
<button type="submit">Log in</button>
</form>
</body>
</html>
