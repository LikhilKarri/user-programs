<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #2c2c2c;
}

.login-form {
  width: 350px;
  background: #3a3a3a;
  padding: 30px;
  border-radius: 8px;
  color: white;
}

.login-form h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: none;
  border-radius: 4px;
}

button {
  width: 100%;
  padding: 10px;
  background: blue;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background: darkblue;
}
</style>
</head>
<body>
<form class="login-form">
  <h2>Log into website</h2>

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Mobile number, username or email">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Password">

  <button type="submit">Log in</button>
</form>
</body>
</html>
